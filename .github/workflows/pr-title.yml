name: Lint PR Title

# GitHub uses the pull request title as the commit subject when "Squash and
# merge" is used. The commitlint job in ci.yml only checks the individual
# commit messages, so a mis-formatted PR title still produces an invalid
# squash commit on main. This workflow validates the PR title against the
# Conventional Commits spec so the merged subject stays valid.
#
# See: https://github.com/Bluetooth-Devices/dbus-fast/issues/531

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commits types accepted by @commitlint/config-conventional,
          # matching the existing commitlint job in ci.yml.
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
          requireScope: false
          # Subject (text after the type/scope) must start lowercase, matching
          # @commitlint/config-conventional's subject-case rule.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.
