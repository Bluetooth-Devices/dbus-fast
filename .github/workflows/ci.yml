name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
        os:
          - ubuntu-latest
        extension:
          - "skip_cython"
          - "use_cython"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install libs
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: dbus-daemon python3-gi libgirepository1.0-dev libgirepository-2.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0
          version: 1
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          allow-prereleases: true
      - name: Cache poetry venv
        id: cache-venv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .venv
            src/dbus_fast/**/*.so
          key: venv-v1-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ matrix.extension }}-${{ hashFiles('poetry.lock', 'pyproject.toml', 'build_ext.py', 'src/dbus_fast/**/*.py', 'src/dbus_fast/**/*.pxd') }}
      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: ./.github/actions/poetry-install
        with:
          extension: ${{ matrix.extension }}
      - name: Test with Pytest
        run: dbus-run-session -- poetry run pytest --cov-report=xml --timeout=5 --durations=30 --ignore=tests/benchmarks
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test_big_endian:
    name: Big-endian s390x tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache s390x apt + uv downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/cache-s390x/apt
            ~/cache-s390x/uv
          key: s390x-deps-v1-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            s390x-deps-v1-
      - name: Prepare s390x cache mountpoints
        run: mkdir -p ~/cache-s390x/apt ~/cache-s390x/uv
      - uses: uraimo/run-on-arch-action@1c358dc49363439f8c563ce8f93005f7fe76b849 # v3
        name: Run commands
        id: runcmd
        with:
          arch: s390x
          distro: ubuntu_latest
          dockerRunArgs: |
            --volume /home/runner/cache-s390x/apt:/var/cache/apt/archives
            --volume /home/runner/cache-s390x/uv:/root/.cache/uv
          run: |
            # Keep downloaded .deb files so the host-side cache picks them up.
            rm -f /etc/apt/apt.conf.d/docker-clean
            echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' \
              > /etc/apt/apt.conf.d/99keep-downloaded
            apt-get -y update
            apt-get -y install --no-install-recommends \
              ca-certificates git python3-pip python3-venv python3-dev \
              gcc dbus-daemon python3-gi
            pip install --break-system-packages uv
            git clone --depth 1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
            cd dbus-fast
            git fetch origin --depth 1 "$GITHUB_SHA"
            git checkout "$GITHUB_SHA"
            # Reuse apt's python3-gi rather than rebuilding PyGObject from
            # source under QEMU s390x emulation (~5min), and skip pycairo
            # entirely since the tests don't import cairo.
            uv venv --system-site-packages .venv
            . .venv/bin/activate
            REQUIRE_CYTHON=1 uv pip install \
              -e . \
              pytest pytest-asyncio pytest-cov pytest-timeout covdefaults
            dbus-run-session -- pytest --no-cov --timeout=100 --durations=30 \
              --ignore=tests/benchmarks
      - name: Reclaim cache dirs for actions/cache save
        if: always()
        run: sudo chown -h -R "$(id -u):$(id -g)" ~/cache-s390x || true

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install libs
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: dbus-daemon python3-gi libgirepository1.0-dev libgirepository-2.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0
          version: 1
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install poetry
        run: uv tool install poetry
      - name: Setup Python 3.14
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14
          cache: "poetry"
      - name: Cache poetry venv
        id: cache-venv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .venv
            src/dbus_fast/**/*.so
          key: venv-v1-${{ runner.os }}-benchmark-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml', 'build_ext.py', 'src/dbus_fast/**/*.py', 'src/dbus_fast/**/*.pxd') }}
      - name: Install Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: ./.github/actions/poetry-install
        with:
          extension: use_cython
      - name: Run benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: instrumentation
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: dbus-run-session -- poetry run pytest --no-cov -vvvvv --codspeed tests/benchmarks

  # PRs and non-main pushes: validate the PSR config with a read-only dry run.
  # No environment and no elevated permissions, so PR runs can never enter the
  # release environment (avoiding approval-gate hangs) or hold OIDC/write tokens.
  release_dry_run:
    needs:
      - test
      - lint
    if: github.ref_name != 'main'

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Create local branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: git switch -C "$BRANCH"

      - name: Test release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          no_operation_mode: true

  # main only: real release + publish. The environment and OIDC/write
  # permissions live here so they are never granted on PR runs.
  release:
    needs:
      - test
      - lint
    if: github.ref_name == 'main'

    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      newest_release_tag: ${{ steps.release_tag.outputs.newest_release_tag }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Create local branch name
        env:
          BRANCH: ${{ github.ref_name }}
        run: git switch -C "$BRANCH"

      - name: Release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        if: steps.release.outputs.released == 'true'

      - name: Publish package distributions to GitHub Releases
        uses: python-semantic-release/upload-to-gh-release@0a92b5d7ebfc15a84f9801ebd1bf706343d43711 # main
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install python-semantic-release
        run: python3 -m pip install python-semantic-release==7.34.6

      - name: Get Release Tag
        id: release_tag
        shell: bash
        run: |
          echo "newest_release_tag=$(semantic-release print-version --current)" >> $GITHUB_OUTPUT

  build_wheels:
    needs: [release]
    if: needs.release.outputs.released == 'true'

    name: Build wheels on ${{ matrix.os }} ${{ matrix.musl }} ${{ matrix.qemu }} ${{ matrix.pyver }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-latest, macos-latest]
        musl: ["", "musllinux"]
        qemu: [""]
        pyver: [""]
        exclude:
          - os: macos-latest
            musl: "musllinux"
        include:
          # qemu is slow, make a single runner per Python version
          - {
              os: ubuntu-latest,
              qemu: riscv64,
              musl: "musllinux",
              pyver: cp310,
            }
          - {
              os: ubuntu-latest,
              qemu: riscv64,
              musl: "musllinux",
              pyver: cp311,
            }
          - {
              os: ubuntu-latest,
              qemu: riscv64,
              musl: "musllinux",
              pyver: cp312,
            }
          - {
              os: ubuntu-latest,
              qemu: riscv64,
              musl: "musllinux",
              pyver: cp313,
            }
          - {
              os: ubuntu-latest,
              qemu: riscv64,
              musl: "musllinux",
              pyver: cp314,
            }
          - {
              os: ubuntu-latest,
              qemu: riscv64,
              musl: "musllinux",
              pyver: cp314t,
            }
          - { os: ubuntu-latest, qemu: riscv64, musl: "", pyver: cp310 }
          - { os: ubuntu-latest, qemu: riscv64, musl: "", pyver: cp311 }
          - { os: ubuntu-latest, qemu: riscv64, musl: "", pyver: cp312 }
          - { os: ubuntu-latest, qemu: riscv64, musl: "", pyver: cp313 }
          - { os: ubuntu-latest, qemu: riscv64, musl: "", pyver: cp314 }
          - { os: ubuntu-latest, qemu: riscv64, musl: "", pyver: cp314t }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: "v${{ needs.release.outputs.newest_release_tag }}"
          fetch-depth: 0

      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: all
          # xref https://github.com/docker/setup-qemu-action/issues/188
          # xref https://github.com/tonistiigi/binfmt/issues/215
          image: tonistiigi/binfmt:qemu-v8.1.5
        id: qemu

      - name: Limit to a specific Python version on slow QEMU
        if: ${{ matrix.pyver }}
        run: echo "CIBW_BUILD=${{ matrix.pyver }}-*" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_SKIP: "*p38-* ${{ matrix.musl == 'musllinux' && '*manylinux*' || '*musllinux*' }}"
          CIBW_BEFORE_ALL_LINUX: apt-get install -y gcc || yum install -y gcc || apk add gcc
          CIBW_BUILD_VERBOSITY: 3
          REQUIRE_CYTHON: 1
          CIBW_ARCHS_LINUX: ${{ ( matrix.os == 'ubuntu-24.04-arm' && 'aarch64' ) || matrix.qemu || 'auto' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./wheelhouse/*.whl
          name: wheels-${{ matrix.os }}-${{ matrix.musl }}-${{ matrix.qemu }}-${{ matrix.pyver }}

  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # unpacks default artifact into dist/
          # if `name: artifact` is omitted, the action will create extra parent dir
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
